# Prosta weryfikacja składni PHP przed merge (theme + mu-plugins)
name: PHP Lint

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'

      - name: Lint mu-plugins
        run: |
          for f in mu-plugins/*.php; do php -l "$f" || exit 1; done

      - name: Lint theme (tech-storefront)
        run: |
          find wp-content/themes/tech-storefront -name "*.php" -exec php -l {} \;

      - name: Lint theme (mnsk7-storefront)
        run: |
          find wp-content/themes/mnsk7-storefront -name "*.php" -exec php -l {} \;
